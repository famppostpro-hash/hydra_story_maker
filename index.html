<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hydra Story Maker</title>

<!-- React + Babel (CDN) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<!-- ReactFlow v11 (compatible with React 18 UMD) -->
<script src="https://unpkg.com/reactflow@11/dist/umd/index.js"></script>
<link rel="stylesheet" href="https://unpkg.com/reactflow@11/dist/style.css" />

<style>
  :root {
    --bg: #0d0b14;
    --surface: #1a1528;
    --surface2: #231d36;
    --border: #2e2550;
    --accent: #7c3aed;
    --accent2: #a78bfa;
    --text: #e2d9f3;
    --text2: #9d8ec4;
    --danger: #ef4444;
    --success: #22c55e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; height: 100vh; overflow: hidden; }
  button { cursor: pointer; border: none; font-family: inherit; }
  input, textarea, select { font-family: inherit; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  #root { height: 100vh; display: flex; flex-direction: column; }

  .topbar {
    height: 48px; background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; overflow-x: auto;
  }
  .topbar-logo { font-size: 16px; font-weight: 700; color: var(--accent2); margin-right: 8px; flex-shrink: 0; }
  .tab-btn {
    padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 500;
    background: transparent; color: var(--text2); transition: all 0.15s;
    display: flex; align-items: center; gap: 6px; flex-shrink: 0; white-space: nowrap;
  }
  .tab-btn:hover { background: var(--surface2); color: var(--text); }
  .tab-btn.active { background: var(--accent); color: #fff; }
  .tab-close {
    opacity: 0.6; font-size: 14px; line-height: 1; padding: 0 2px; background: transparent; color: inherit;
    border-radius: 3px;
  }
  .tab-close:hover { opacity: 1; color: var(--danger); background: rgba(239,68,68,0.15); }
  .new-project-btn {
    padding: 6px 10px; border-radius: 6px; background: var(--surface2); color: var(--text2);
    font-size: 18px; line-height: 1; transition: all 0.15s; flex-shrink: 0;
  }
  .new-project-btn:hover { background: var(--accent); color: #fff; }
  .topbar-right { margin-left: auto; display: flex; gap: 8px; flex-shrink: 0; }
  .icon-btn {
    padding: 6px 10px; border-radius: 6px; background: var(--surface2); color: var(--text2);
    font-size: 13px; transition: all 0.15s;
  }
  .icon-btn:hover { background: var(--border); color: var(--text); }

  .main { flex: 1; display: flex; overflow: hidden; }

  /* Sidebar */
  .sidebar {
    width: 240px; background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  .sidebar-tabs {
    display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .sidebar-tab {
    flex: 1; padding: 10px 4px; font-size: 11px; font-weight: 600; text-align: center;
    background: transparent; color: var(--text2); border-bottom: 2px solid transparent;
    transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .sidebar-tab:hover { color: var(--text); }
  .sidebar-tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }
  .sidebar-section { padding: 10px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .sidebar-title {
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text2); margin-bottom: 8px;
  }
  .add-btn {
    width: 100%; padding: 7px 10px; border-radius: 6px; background: var(--accent);
    color: #fff; font-size: 13px; font-weight: 500; transition: background 0.15s;
    display: flex; align-items: center; gap: 6px; justify-content: center;
  }
  .add-btn:hover { background: #6d28d9; }
  .sidebar-list { overflow-y: auto; flex: 1; }

  /* Character card */
  .char-card {
    padding: 8px 12px; display: flex; align-items: center; gap: 8px;
    cursor: pointer; transition: background 0.1s; border-bottom: 1px solid var(--border);
  }
  .char-card:hover { background: var(--surface2); }
  .char-card.active { background: var(--surface2); }
  .char-avatar {
    width: 28px; height: 28px; border-radius: 50%; background: var(--accent);
    display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700;
    flex-shrink: 0; overflow: hidden;
  }
  .char-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .char-name { font-size: 13px; font-weight: 500; }
  .char-role { font-size: 11px; color: var(--text2); }

  /* Item card */
  .item-card {
    padding: 8px 12px; display: flex; align-items: center; gap: 8px;
    cursor: pointer; transition: background 0.1s; border-bottom: 1px solid var(--border);
  }
  .item-card:hover { background: var(--surface2); }
  .item-card.active { background: var(--surface2); }
  .item-icon { font-size: 18px; flex-shrink: 0; }
  .item-name { font-size: 13px; font-weight: 500; }
  .item-cat { font-size: 11px; color: var(--text2); }

  /* Canvas area */
  .canvas-area { flex: 1; position: relative; background: var(--bg); }
  .react-flow { background: var(--bg); }
  .react-flow__background { background: var(--bg); }

  /* Scene Node */

    background: var(--surface); border: 2px solid var(--border); border-radius: 10px;
